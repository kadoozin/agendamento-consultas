spring:
  application:
    name: agendamento-consultas

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

viacep:
  url: https://viacep.com.br/ws

twilio:
  enabled: ${TWILIO_ENABLED:false}
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  from: ${TWILIO_FROM:}
  channel: ${TWILIO_CHANNEL:whatsapp}

app:
  reminders:
    cron: ${REMINDERS_CRON:0 0 8 * * *}
