spring:
  datasource:
    url: jdbc:h2:mem:agendamento-consultas-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false

jwt:
  secret: 12345678901234567890123456789012
  expiration: 86400000
  refresh-expiration: 604800000

twilio:
  enabled: false

app:
  auth:
    bootstrap-admin-enabled: true
